<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="container">
        <article id="container2">
            <section class="scoreSection">
                <h1>HOME</h1>
                <p class="scoreDisplay">0</p>
                <section class="incremBtnSec">
                    <button class="incremBtn">+1</button>
                    <button class="incremBtn">+2</button>
                    <button class="incremBtn">+3</button>
                </section>
            </section>

            <section class="scoreSection">
                <h1>GUEST</h1>
                <p class="scoreDisplay">0</p>
                <section class="scoreIncremBtn">
                    <button class="incremBtn">+1</button>
                    <button class="incremBtn">+2</button>
                    <button class="incremBtn">+3</button>
                </section>
            </section>
        </article>

        <section id="newgameSec">
            <button id="newgameBtn">New Game</button>
        </section>
    </main>
    
</body>

<script src="script.js"></script>

</html>
